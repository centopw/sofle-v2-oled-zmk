# OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Rotary encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ZMK Studio (live keymap editing over USB -- left half only via build.yaml)
CONFIG_ZMK_STUDIO_LOCKING=n

# Power management
# Deep sleep after idle -- critical for battery life on wireless keyboards.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Soft off (keyboard power-down via keymap binding)
CONFIG_ZMK_PM_SOFT_OFF=y

# BLE improvements
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Split keyboard: report peripheral (right half) battery level to host via central (left half)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Mouse keys
CONFIG_ZMK_MOUSE=y
